name: Daily Catalog Scraper

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer browsers
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE: ${{ secrets.CF_KV_NAMESPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SCRAPER_USER: ${{ secrets.SCRAPER_USER }}
          CDATA_USER: ${{ secrets.CDATA_USER }}
          CDATA_PASS: ${{ secrets.CDATA_PASS }}
          MORLEVI_USER: ${{ secrets.MORLEVI_USER }}
          MORLEVI_PASS: ${{ secrets.MORLEVI_PASS }}
          AMTEL_USER: ${{ secrets.AMTEL_USER }}
          AMTEL_PASS: ${{ secrets.AMTEL_PASS }}
          TECHNO_USER: ${{ secrets.TECHNO_USER }}
          TECHNO_PASS: ${{ secrets.TECHNO_PASS }}
          ATOMIC_USER: ${{ secrets.ATOMIC_USER }}
          ATOMIC_PASS: ${{ secrets.ATOMIC_PASS }}
          CMS_USER: ${{ secrets.CMS_USER }}
          CMS_PASS: ${{ secrets.CMS_PASS }}
        run: node scraper.js

      - name: Notify on failure
        if: failure()
        run: echo "Scraper failed"
